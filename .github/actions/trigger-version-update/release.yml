# NOTE: Version is hardcoded to 2.1.5 for testing purposes.
# TODO: Replace with dynamic version (from release workflow) once validated.

- name: Trigger Example Repository Workflow
  env:
    GH_TOKEN: ${{ secrets.GH_TOKEN }}
  run: |
    curl -X POST \
      -H "Authorization: Bearer $GH_TOKEN" \
      -H "Accept: application/vnd.github+json" \
      https://api.github.com/repos/finos/fluxnova-examples/dispatches \
      -d '{
        "event_type": "update-version",
        "client_payload": {
          "version": "2.1.5"
        }
      }'