# Camunda BPM Configuration
spring.camunda.bpm.enabled=true
spring.camunda.bpm.admin-user.id=admin
spring.camunda.bpm.admin-user.password=admin
spring.camunda.bpm.database.schema-update=true
spring.camunda.bpm.history-level=full
spring.camunda.bpm.job-execution.enabled=true
spring.camunda.bpm.deployment-resource-pattern=classpath*:**/*.bpmn

# Camunda Process Engine
camunda.bpm.process-engine-name=default
camunda.bpm.default-serialization-format=application/json
camunda.bpm.id-generator=strong

# Environment Variables
CAMUNDA_BPM_URL=http://localhost:8080/camunda
CAMUNDA_BPM_ADMIN_USER=admin
CAMUNDA_BPM_ADMIN_PASSWORD=secret

# Application URLs
app.process.url=/camunda/api/process
app.engine.endpoint=/camunda/engine-rest

# Database
spring.datasource.url=jdbc:h2:mem:camunda-db
spring.datasource.driver-class-name=org.h2.Driver

# Application Name
spring.application.name=Camunda Process Application
app.description=Camunda BPM Integration

# Deployment
deployment.artifact=camunda-process-app
deployment.version=camunda-7.15.0
