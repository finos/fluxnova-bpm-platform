# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================

# Spring Boot banner display mode
spring.main.banner-mode=console

# =============================================================================
# DATABASE - H2 (Local Development Only)
# =============================================================================
# H2 is a lightweight Java database for development/testing.
# Data is stored in ./target/database/db.mv.db (cleaned by 'mvn clean')
#
# ?? NOT for production! Use PostgreSQL, MySQL, or Oracle instead.

spring.datasource.url=jdbc:h2:./target/database/db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=APP_USER
spring.datasource.password=
spring.datasource.platform=h2

# =============================================================================
# H2 WEB CONSOLE
# =============================================================================
# Access database at: http://localhost:8080/h2-console
# Login with:
#   - jdbc:h2:./target/database/db
#   - APP_USER
#   - (no password)
#
# ?? Disable in production: spring.h2.console.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================================================
# FLUXNOVA - DEFAULT ADMIN USER
# =============================================================================
# Creates admin user on first startup for Fluxnova web apps:
# - Tasklist: http://localhost:8080/fluxnova/app/tasklist
# - Monitoring: http://localhost:8080/fluxnova/app/monitoring
# - Admin: http://localhost:8080/fluxnova/app/admin
#
# ?? DEVELOPMENT ONLY!
# Production: Disable this and use AD-controlled roles for admin access.

fluxnova.bpm.admin-user.id=demo
fluxnova.bpm.admin-user.password=demo
fluxnova.bpm.admin-user.first-name=Demo
fluxnova.bpm.admin-user.last-name=User

# =============================================================================
# FLUXNOVA - EXTERNAL TASK CLIENT
# =============================================================================
# Configures external task workers (for async/long-running operations)
# Current setup: CreateLoanAccountTaskHandler runs in same app (demo only)
# Production: Move external task handlers to separate microservices

# REST API endpoint for external task polling
fluxnova.bpm.client.base-url=http://localhost:8080/engine-rest

# How long worker can hold a task before auto-release (2 minutes)
fluxnova.bpm.client.lock-duration=120000

# Subscribe to "createLoanAccount" topic from LoanApplicationProcess
fluxnova.bpm.client.subscriptions.createLoanAccount.processDefinitionKey=LoanApplicationProcess
